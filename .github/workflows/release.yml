name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Test
        run: make test

      - name: Vet
        run: make vet

      - name: Build release binaries
        run: make release

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bin/slimnode-linux-amd64
            bin/slimnode-linux-arm64
            bin/slimnode-server-linux-amd64
            bin/slimnode-server-linux-arm64
            bin/checksums.txt
